<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Content Manager</title>
    <link href="./styles.css?v=2" rel="stylesheet" />
    <link rel="stylesheet" href="./ckeditor5/ckeditor5.css" />
    <style>
      [id$='_previewImage'] {
        display: block;
        margin: 1rem 0;
        width: 100% !important;
        height: auto !important;
      }
      [id$='_previewImage'][style*='float: left'] {
        margin: 0 1rem 1rem 0;
        width: 45% !important;
        height: auto !important;
      }
      [id$='_previewImage'][style*='float: right'] {
        margin: 0 0 1rem 1rem;
        width: 45% !important;
        height: auto !important;
      }
    </style>
  </head>
  <body>
    <script type="importmap">
      {
        "imports": {
          "ckeditor5": "./ckeditor5/ckeditor5.js",
          "ckeditor5/": "./ckeditor5/"
        }
      }
    </script>

    <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>

    <script type="module">
      import {
        ClassicEditor,
        Essentials,
        Paragraph,
        Bold,
        Italic,
        SourceEditing,
        Heading,
        BlockQuote,
        ShowBlocks,
        Image,
        ImageToolbar,
        List,
        HorizontalLine,
        Strikethrough,
        RemoveFormat,
        Table,
        Link,
        PastePlainText,
        PasteFromOffice,
        EventInfo,
        TableToolbar,
        FindAndReplace,
        ImageUtils,
        ImageStyle,
        ImageCaption,
        HeadingButtonsUI,
        ParagraphButtonUI,
        ButtonView,
        IconImage,
      } from 'ckeditor5';

      import markdownIt from 'https://cdn.jsdelivr.net/npm/markdown-it@14.1.1/+esm';

      (function () {
        const md = markdownIt({ html: true });

        function uuid() {
          return 'id-' + Math.random().toString(36).slice(2);
        }

        function cleanupTags(src) {
          return src
            .replace(/(<[a-z])/g, '\n$1')
            .split('{{&lt;')
            .map((piece, index) => {
              if (!index) return piece;

              const parts = piece.split('&gt;}}');
              const inside = parts[0];
              const rest = parts[1];

              return (
                '{{&lt;' +
                inside
                  .replace(/(<([^>]+?)>)/gi, '')
                  .replace(/&nbsp;/g, ' ')
                  .replace(/&(quot|bdquo|rdquo|ldquo);/g, '"') +
                '&gt;}}' +
                rest
              );
            })
            .join('')
            .replace(/.*{{&lt;/g, '\n\n{{<')
            .replace(/&gt;}}.*/g, '>}}\n\n')
            .replace(/href="content\//g, 'href="')
            .replace(/href="content-en\//g, 'href="')
            .trim();
        }

        class MediaLibraryButton {
          constructor(editor) {
            this.editor = editor;
          }

          init() {
            this.addButton('addImage', 'Přidat obrázek');
          }

          addButton(action, label) {
            const editor = this.editor;

            editor.ui.componentFactory.add(action, locale => {
              const config = editor.config.get('mediaLibraryButton');

              const imageIcon = ClassicEditor?.icons?.image || window.CKEDITOR?.icons?.image;

              const view = new ButtonView(locale);

              view.set({
                label: label,
                icon: IconImage,
                withText: false,
                tooltip: true,
              });

              view.on('execute', () => {
                if (config && config.openMediaLibrary) {
                  config.openMediaLibrary();
                }
              });

              return view;
            });
          }
        }

        function openMediaLib(options) {
          const { field, callback, value, controlID } = options;

          let mediaLibraryFieldOptions;

          if (field && field.get && field.getIn && field.hasIn && field.hasIn(['options', 'media_library'])) {
            mediaLibraryFieldOptions = field.getIn(['options', 'media_library']);
          } else if (field && field.get) {
            mediaLibraryFieldOptions = field.get('media_library');
          }

          return function () {
            callback({
              controlID: controlID,
              forImage: false,
              privateUpload: field && field.get && field.get('private'),
              value,
              allowMultiple: false,
              config:
                mediaLibraryFieldOptions && mediaLibraryFieldOptions.get
                  ? mediaLibraryFieldOptions.get('config')
                  : undefined,
              field,
            });
          };
        }

        const CustomEditorControl = createClass({
          getInitialState() {
            return {
              controlID: uuid(),
              editor: null,
            };
          },

          componentDidUpdate(prevProps) {
            const mediaPath =
              this.props.mediaPaths && this.props.mediaPaths.get && this.props.mediaPaths.get(this.state.controlID);

            const prevMediaPath =
              prevProps.mediaPaths && prevProps.mediaPaths.get && prevProps.mediaPaths.get(this.state.controlID);

            if (mediaPath !== prevMediaPath) {
              const editor = this.state.editor;
              if (!editor) return;

              editor.model.change(writer => {
                const src = mediaPath;
                const alt = src.replace(/^.+\//, '');

                if (/(jpeg|jpg|png|gif|webp|svg)$/i.test(src)) {
                  const imageUtils = editor.plugins.get('ImageUtils');
                  imageUtils.insertImage({ src, alt }, null, 'imageBlock', { setImageSizes: false });
                } else if (src) {
                  const viewFragment = editor.data.processor.toView(`<a href="${src}">${alt}</a>`);

                  const modelFragment = editor.data.toModel(viewFragment);

                  editor.model.insertContent(modelFragment);
                }
              });
            }
          },

          handleChange(event, editor) {
            const data = cleanupTags(editor.getData());
            this.props.onChange(data);
            this.props.getAsset();
          },

          render() {
            const self = this;

            return h('div', { className: 'custom-editor-wrapper' }, [
              h('div', {
                ref: function (node) {
                  if (!node || self.state.editor) return;

                  ClassicEditor.create(node, {
                    licenseKey: 'GPL',
                    language: 'cs',
                    initialData: typeof self.props.value === 'string' ? md.render(self.props.value) : '',
                    mediaLibraryButton: {
                      openMediaLibrary: openMediaLib({
                        field: self.props.field,
                        value: self.props.value,
                        controlID: self.state.controlID,
                        callback: self.props.onOpenMediaLibrary,
                      }),
                    },
                    plugins: [
                      Essentials,
                      Bold,
                      BlockQuote,
                      Italic,
                      Paragraph,
                      FindAndReplace,
                      List,
                      Heading,
                      Image,
                      ImageStyle,
                      ImageUtils,
                      ImageCaption,
                      ImageToolbar,
                      HorizontalLine,
                      Link,
                      Table,
                      Strikethrough,
                      RemoveFormat,
                      PastePlainText,
                      PasteFromOffice,
                      HeadingButtonsUI,
                      ParagraphButtonUI,
                      TableToolbar,
                      ShowBlocks,
                      SourceEditing,
                      MediaLibraryButton,
                    ],
                    toolbar: [
                      'undo',
                      'redo',
                      '|',
                      'paragraph',
                      'heading1',
                      'heading2',
                      'heading3',
                      'bulletedList',
                      'numberedList',
                      '|',
                      'bold',
                      'italic',
                      'strikethrough',
                      'removeFormat',
                      '|',
                      'addImage',
                      'link',
                      'blockQuote',
                      'horizontalLine',
                      'insertTable',
                      '|',
                      'findAndReplace',
                      'showBlocks',
                      'sourceEditing',
                    ],
                    table: {
                      contentToolbar: ['tableColumn', 'tableRow', 'mergeTableCells'],
                    },
                    image: {
                      toolbar: [
                        'toggleImageCaption',
                        'imageTextAlternative',
                        'imageStyle:block',
                        'imageStyle:wrapText',
                      ],
                    },
                  }).then(editor => {
                    self.setState({ editor: editor });

                    editor.model.document.on('change:data', () => self.handleChange(null, editor));
                  });
                },
              }),
            ]);
          },
        });

        CMS.registerWidget('customEditor', CustomEditorControl);
      })();
    </script>
  </body>
</html>
